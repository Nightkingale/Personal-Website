name: website

services:
  jekyll:
    build:
      context: ./data
      dockerfile: Dockerfile
    container_name: website-jekyll
    working_dir: /app
    volumes:
      - ./build:/build
    command: ["bundle", "exec", "jekyll", "build", "--source", "/app", "--destination", "/build"]
  nginx:
    image: nginx:stable-alpine
    container_name: website-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./data/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro